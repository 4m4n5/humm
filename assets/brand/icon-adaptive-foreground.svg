<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hum - Android adaptive icon foreground (transparent background).

  Same composition as icon-master.svg but with no canvas fill.
  Composited at runtime over `app.json` adaptiveIcon.backgroundColor
  (#0B0B12) so the final rendering matches icon-master pixel-for-pixel
  while honoring Android's per-launcher mask (circle, squircle,
  teardrop, squircle, etc).

  All critical content stays well within the center 66% safe area
  (the wave path fits inside a 512x384 rectangle centered on the
  canvas, well clear of the cropping zones).
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="outer" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="42"/>
    </filter>
    <filter id="inner" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>
  <path d="M 232 512 C 296 320, 424 320, 488 512 C 552 704, 680 704, 744 512"
        stroke="#FFB392" stroke-width="40" stroke-linecap="round" fill="none"
        filter="url(#outer)" opacity="0.7"/>
  <path d="M 232 512 C 296 320, 424 320, 488 512 C 552 704, 680 704, 744 512"
        stroke="#FF8E9B" stroke-width="40" stroke-linecap="round" fill="none"
        filter="url(#inner)"/>
  <path d="M 232 512 C 296 320, 424 320, 488 512 C 552 704, 680 704, 744 512"
        stroke="#FF8E9B" stroke-width="40" stroke-linecap="round" fill="none"/>
</svg>
