<?xml version="1.0" encoding="UTF-8"?>
<!--
  D2 - wave only with soft glow (like original humm logo)
  Same wave as D1 but with a gaussian-blurred duplicate underneath
  creating a soft rose halo. NOTE: baked glow is non-compliant
  with iOS 26 Liquid Glass spec (which adds depth dynamically),
  but viable for marketing assets and Android adaptive icon.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <path d="M 232 512
           C 296 320, 424 320, 488 512
           C 552 704, 680 704, 744 512"
        stroke="#FF8E9B" stroke-width="40" stroke-linecap="round" fill="none"
        filter="url(#glow)"/>
</svg>
