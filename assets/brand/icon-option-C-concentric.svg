<?xml version="1.0" encoding="UTF-8"?>
<!--
  humm - Option C . "concentric"
  ============================================================
  Concept
    Same vocabulary as tir (one ring + one dot) but inverted
    composition: the dot sits CENTERED inside the ring instead
    of offset. Where tir uses asymmetry to express "captured /
    reached", humm uses symmetry to express "grounded /
    together at the centre".

  Family DNA (maximum cohesion with tir)
    - Identical primitive vocabulary (ring + single dot)
    - Identical canvas, identical flat-geometry rule
    - Only two things differ between tir and humm:
        1. Accent color (cyan - rose)
        2. Symmetry (offset dot - centered dot)
    - This makes the studio identity *legible* - a viewer who
      sees both icons next to each other immediately reads
      "same studio, two takes on the same idea".

  Trade-off
    Most cohesive with tir, but the centred composition reads
    closer to a generic "bullseye / target" than something
    distinctly couple-themed. Strong on family identity, weak
    on per-app character.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <circle cx="512" cy="512" r="340" stroke="#FF8E9B" stroke-width="24" fill="none"/>
  <circle cx="512" cy="512" r="96" fill="#FF8E9B"/>
</svg>
