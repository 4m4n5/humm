<?xml version="1.0" encoding="UTF-8"?>
<!--
  D4 - thick bold wave + dots
  Same composition as D but with a much heavier stroke (56px vs
  36px). More presence at small sizes, more "weight" to the mark.
  Dots shrink proportionally so they read as riding the wave
  rather than floating above it.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <path d="M 232 512
           C 296 320, 424 320, 488 512
           C 552 704, 680 704, 744 512"
        stroke="#FF8E9B" stroke-width="56" stroke-linecap="round" fill="none"/>
  <circle cx="360" cy="356" r="42" fill="#FF8E9B"/>
  <circle cx="616" cy="668" r="42" fill="#FF8E9B"/>
</svg>
