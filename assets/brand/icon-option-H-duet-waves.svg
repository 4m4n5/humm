<!--
  humm - Option H - "duet waves"
  Two single-period sine waves, phase-shifted 180 degrees so
  their peaks meet the other wave's troughs. They cross at zero
  crossings, weaving like a double helix. No dots - the waves
  themselves are the couple. "Two voices in counterpoint."
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <path d="M 232 512 C 296 320, 424 320, 488 512 C 552 704, 680 704, 744 512"
        stroke="#FF8E9B" stroke-width="36" stroke-linecap="round" fill="none"/>
  <path d="M 232 512 C 296 704, 424 704, 488 512 C 552 320, 680 320, 744 512"
        stroke="#FF8E9B" stroke-width="36" stroke-linecap="round" fill="none"/>
</svg>
