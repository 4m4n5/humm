<?xml version="1.0" encoding="UTF-8"?>
<!--
  D8 - tall wave + glow (no dots)
  D7's high-amplitude wave with a warm halo. The most dramatic
  of the no-dot variants. High presence, high character.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="26" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <path d="M 232 512
           C 280 220, 420 220, 488 512
           C 556 804, 696 804, 744 512"
        stroke="#FF8E9B" stroke-width="40" stroke-linecap="round" fill="none"
        filter="url(#glow)"/>
</svg>
