<?xml version="1.0" encoding="UTF-8"?>
<!--
  D7 - taller wave, higher amplitude
  Stretches the wave vertically so peaks nearly touch the safe
  inset. More "vibrant hum" / "high energy frequency". No dots.
  The vertical stretch gives the mark more drama and presence
  at all sizes.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <path d="M 232 512
           C 280 220, 420 220, 488 512
           C 556 804, 696 804, 744 512"
        stroke="#FF8E9B" stroke-width="40" stroke-linecap="round" fill="none"/>
</svg>
