<?xml version="1.0" encoding="UTF-8"?>
<!--
  humm - Option E - "two orbits"
  Two concentric rings, no dot. Each partner has their own orbit;
  they share the centre. Pure ring vocabulary, no filled element.
  Closest formal cousin to tir's ring grammar.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <circle cx="512" cy="512" r="340" stroke="#FF8E9B" stroke-width="24" fill="none"/>
  <circle cx="512" cy="512" r="180" stroke="#FF8E9B" stroke-width="24" fill="none"/>
</svg>
