<?xml version="1.0" encoding="UTF-8"?>
<!--
  humm - Option F - "tangent rings"
  Two rings touching externally at a single point. One ring
  slightly larger than the other to introduce asymmetry (matches
  tir's offset-as-character rule). Reads as "two lives meeting."
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <circle cx="320" cy="512" r="180" stroke="#FF8E9B" stroke-width="24" fill="none"/>
  <circle cx="712" cy="512" r="212" stroke="#FF8E9B" stroke-width="24" fill="none"/>
</svg>
