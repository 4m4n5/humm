<?xml version="1.0" encoding="UTF-8"?>
<!--
  D6 - wider wave, lower amplitude
  Stretches the wave horizontally and flattens the peaks. Feels
  more "calm hum" than "resonance". More landscape-proportioned
  within the square canvas. No dots - the calmness IS the message.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <path d="M 172 512
           C 252 380, 400 380, 488 512
           C 576 644, 724 644, 804 512"
        stroke="#FF8E9B" stroke-width="40" stroke-linecap="round" fill="none"/>
</svg>
