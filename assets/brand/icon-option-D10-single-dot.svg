<!--
  D10 - wave + single dot at the crest
  Closest structural cousin to tir (one element = container/medium,
  one dot = subject). Reads as "one presence riding a shared
  frequency." Could also read as "you, on our wavelength."
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <path d="M 232 512
           C 296 320, 424 320, 488 512
           C 552 704, 680 704, 744 512"
        stroke="#FF8E9B" stroke-width="36" stroke-linecap="round" fill="none"/>
  <circle cx="360" cy="352" r="52" fill="#FF8E9B"/>
</svg>
