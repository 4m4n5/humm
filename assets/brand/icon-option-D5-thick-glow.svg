<?xml version="1.0" encoding="UTF-8"?>
<!--
  D5 - thick bold wave + dots + glow
  The weight of D4 with the warmth of D3's glow. Maximum
  presence and character.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <g filter="url(#glow)">
    <path d="M 232 512
             C 296 320, 424 320, 488 512
             C 552 704, 680 704, 744 512"
          stroke="#FF8E9B" stroke-width="56" stroke-linecap="round" fill="none"/>
    <circle cx="360" cy="356" r="42" fill="#FF8E9B"/>
    <circle cx="616" cy="668" r="42" fill="#FF8E9B"/>
  </g>
</svg>
