<?xml version="1.0" encoding="UTF-8"?>
<!--
  humm - Option I - "in-phase"
  Same wave as D, but both dots cluster at the SAME peak instead
  of riding opposite peaks. Where D says "in counterpoint," I
  says "in unison" - both partners up at the same moment, sharing
  the same crest. Subtle inversion of D's emotional reading.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <path d="M 232 512 C 296 320, 424 320, 488 512 C 552 704, 680 704, 744 512"
        stroke="#FF8E9B" stroke-width="36" stroke-linecap="round" fill="none"/>
  <circle cx="332" cy="376" r="48" fill="#FF8E9B"/>
  <circle cx="396" cy="376" r="48" fill="#FF8E9B"/>
</svg>
