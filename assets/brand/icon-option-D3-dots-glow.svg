<?xml version="1.0" encoding="UTF-8"?>
<!--
  D3 - original D (wave + two dots at peaks) with soft glow
  The full "resonance" composition with a warm halo like the
  original humm letterform icon.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <g filter="url(#glow)">
    <path d="M 232 512
             C 296 320, 424 320, 488 512
             C 552 704, 680 704, 744 512"
          stroke="#FF8E9B" stroke-width="36" stroke-linecap="round" fill="none"/>
    <circle cx="360" cy="360" r="48" fill="#FF8E9B"/>
    <circle cx="616" cy="664" r="48" fill="#FF8E9B"/>
  </g>
</svg>
