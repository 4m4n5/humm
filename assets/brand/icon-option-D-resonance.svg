<?xml version="1.0" encoding="UTF-8"?>
<!--
  humm - Option D . "resonance"
  ============================================================
  Concept
    A single sine-wave curve (= the "hum" / shared frequency)
    with two dots riding it (= the couple, in phase). The
    wave + dots together visualise the app's name literally:
    a hum is a resonance, and two dots in phase on the same
    waveform is the simplest possible drawing of two people
    in sync.

  Family DNA (third studio shape grammar)
    - Same canvas, same flat-geometry rule, same accent discipline
    - Introduces a third primitive type to the studio: a
      single-period sine curve. If a third aaam.dev app ships
      with a wave-based icon, the family grammar becomes
      "ring | arcs | wave" - three distinct geometric voices.

  Per-app variation
    - Two dots riding the wave at its two peaks (one up, one down)
    - Wave is geometric - single period of a clean sine, not a
      hand-drawn squiggle

  Trade-off
    Strongest concept-to-name match (literal "hum" visualisation)
    but the most distinct from tir of the four options. Best
    pick if you want humm to feel like its own thing first,
    aaam.dev-affiliated second.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0B0B12"/>
  <!-- Single-period sine wave, centered, ~520pt wide, ~140pt amplitude -->
  <path d="M 232 512
           C 296 320, 424 320, 488 512
           C 552 704, 680 704, 744 512"
        stroke="#FF8E9B" stroke-width="36" stroke-linecap="round" fill="none"/>
  <!-- Two dots riding the wave, one at each peak -->
  <circle cx="360" cy="360" r="48" fill="#FF8E9B"/>
  <circle cx="616" cy="664" r="48" fill="#FF8E9B"/>
</svg>
